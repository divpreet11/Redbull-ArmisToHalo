name: NewRelic Exporter

on:
  workflow_run:
    workflows: ["*"]   # Runs after any workflow completes
    types: [completed]

env:
  GHA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  NEW_RELIC_LICENSE_KEY: ${{ secrets.NEW_RELIC_LICENSE_KEY }}
  GHA_RUN_ID: ${{ github.event.workflow_run.id }}
  GHA_RUN_NAME: ${{ github.event.workflow_run.name }}

jobs:
  new-relic-exporter:
    name: Export GitHub Run Data to New Relic
    runs-on: ubuntu-latest
    if: ${{ always() }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Export to New Relic
        uses: newrelic-experimental/gha-new-relic-exporter@v1.0.6
